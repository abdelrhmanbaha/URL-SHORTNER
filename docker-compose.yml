services:

  postgres:
    image: postgres:18
    container_name: urlshortener-postgres
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: bob
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  valkey:
    image: valkey/valkey:8
    container_name: urlshortener-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data

volumes:
  postgres-data:
  valkey-data: